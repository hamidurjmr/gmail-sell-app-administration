<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Gmail Sell Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: #1e293b;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-profile {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
        }

        .admin-avatar {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: bold;
        }

        .admin-profile h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .admin-profile p {
            font-size: 12px;
            opacity: 0.9;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-btn i {
            width: 24px;
        }

        .nav-btn:hover {
            background: #334155;
            color: white;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }

        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 30px;
        }

        .tab {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(59,130,246,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: #3b82f6;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
            color: white;
        }

        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .card-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: white;
        }

        .card-header i {
            font-size: 28px;
            color: #3b82f6;
        }

        .sale-card, .user-card, .withdraw-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .sale-card:hover, .user-card:hover {
            border-color: #3b82f6;
            transform: translateX(5px);
        }

        .sale-info p, .user-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #cbd5e1;
        }

        .sale-info strong, .user-info strong {
            color: white;
        }

        .btn-success, .btn-danger, .btn-primary, .btn-warning {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 20px;
        }

        .modal-content label {
            color: #94a3b8;
            display: block;
            margin: 10px 0 5px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
        }

        .status-active { color: #10b981; font-weight: bold; }
        .status-suspended { color: #f59e0b; font-weight: bold; }
        .status-banned { color: #ef4444; font-weight: bold; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .sale-card, .user-card {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-crown"></i> Admin Panel
                </div>
            </div>
            
            <div class="admin-profile" id="adminProfile">
                <div class="admin-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h3 id="adminName">Loading...</h3>
                <p id="adminEmail">Loading...</p>
            </div>
            
            <div class="nav-menu">
                <button class="nav-btn active" data-tab="verify">
                    <i class="fas fa-check-double"></i> Verify Gmail Sales
                </button>
                <button class="nav-btn" data-tab="users">
                    <i class="fas fa-users"></i> Manage Users
                </button>
                <button class="nav-btn" data-tab="withdrawals">
                    <i class="fas fa-bitcoin"></i> Withdrawals
                </button>
                <button class="nav-btn" data-tab="stats">
                    <i class="fas fa-chart-line"></i> Statistics
                </button>
                <button class="nav-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Verify Sales Tab -->
            <div id="verifyTab" class="tab active">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-clock"></i> Pending Verifications</h2>
                        <i class="fas fa-gavel"></i>
                    </div>
                    <div id="pendingSales" class="sales-list">
                        <div class="loading">Loading pending sales...</div>
                    </div>
                </div>
            </div>
            
            <!-- Users Tab -->
            <div id="usersTab" class="tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-users"></i> All Users</h2>
                        <i class="fas fa-user-cog"></i>
                    </div>
                    <div id="usersList" class="users-list">
                        <div class="loading">Loading users...</div>
                    </div>
                </div>
            </div>
            
            <!-- Withdrawals Tab -->
            <div id="withdrawalsTab" class="tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-clock"></i> Withdrawal Requests</h2>
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <div id="withdrawalRequests" class="withdraw-list">
                        <div class="loading">Loading withdrawal requests...</div>
                    </div>
                </div>
            </div>
            
            <!-- Statistics Tab -->
            <div id="statsTab" class="tab">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <h3>Total Users</h3>
                        <div class="value" id="totalUsers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                        <h3>Active Users</h3>
                        <div class="value" id="activeUsers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                        <h3>Total Sales</h3>
                        <div class="value" id="totalSales">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                        <h3>Total Payouts</h3>
                        <div class="value" id="totalPayouts">$0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejectModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3><i class="fas fa-times-circle"></i> Reject Gmail Sale</h3>
            <p style="color: #94a3b8; margin-bottom: 15px;">Gmail: <strong id="rejectGmail" style="color: white;"></strong></p>
            <label>Rejection Reason:</label>
            <select id="rejectReason">
                <option value="Wrong Password">Wrong Password</option>
                <option value="Wrong Gmail Address">Wrong Gmail Address</option>
                <option value="Temporary/Disabled Account">Temporary/Disabled Account</option>
                <option value="2-Step Verification Required">2-Step Verification Required</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="otherReason" placeholder="Please specify reason" style="display:none;">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="confirmRejectBtn" class="btn-danger" style="flex: 1;">Confirm Reject</button>
                <button id="closeModalBtn" class="btn-primary" style="flex: 1; background: #475569;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="userEditModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Edit User</h3>
            <div id="editUserInfo"></div>
            <label>Balance (USD):</label>
            <input type="number" id="editBalance" step="0.01">
            <label>Account Status:</label>
            <select id="editStatus">
                <option value="active">Active</option>
                <option value="suspended">Suspended</option>
                <option value="banned">Banned</option>
            </select>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="saveUserBtn" class="btn-success" style="flex: 1;">Save Changes</button>
                <button id="closeUserModalBtn" class="btn-primary" style="flex: 1; background: #475569;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBChVfSCJhhxhDgXWM5x3ryrwYtVZmwSmc",
            authDomain: "sellapp-66d68.firebaseapp.com",
            projectId: "sellapp-66d68",
            storageBucket: "sellapp-66d68.firebasestorage.app",
            messagingSenderId: "478211272161",
            appId: "1:478211272161:web:ed55d6c8b366a192ba36a0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentSaleId = null;
        let currentEditUserId = null;
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'admin') {
                alert('Access denied. Admin only.');
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('adminName').textContent = user.displayName || 'Admin';
            document.getElementById('adminEmail').textContent = user.email;
            
            loadPendingSales();
            loadAllUsers();
            loadWithdrawalRequests();
            loadStatistics();
        });
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.id === 'logoutBtn') {
                    auth.signOut().then(() => window.location.href = 'index.html');
                    return;
                }
                
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`${tab}Tab`).classList.add('active');
                btn.classList.add('active');
                
                if (tab === 'verify') loadPendingSales();
                if (tab === 'users') loadAllUsers();
                if (tab === 'withdrawals') loadWithdrawalRequests();
                if (tab === 'stats') loadStatistics();
            });
        });
        
        function loadPendingSales() {
            const pendingSalesDiv = document.getElementById('pendingSales');
            pendingSalesDiv.innerHTML = '<div class="loading">Loading pending sales...</div>';
            
            db.collection('gmailSales').where('status', '==', 'pending').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    pendingSalesDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-inbox" style="font-size: 48px; color: #475569;"></i><p style="margin-top: 15px;">No pending sales.</p></div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(doc => {
                    const sale = doc.data();
                    const date = sale.createdAt ? sale.createdAt.toDate().toLocaleString() : 'Just now';
                    html += `
                        <div class="sale-card">
                            <div class="sale-info">
                                <p><strong>Seller:</strong> ${sale.userEmail}</p>
                                <p><strong>Gmail:</strong> ${sale.gmailEmail}</p>
                                <p><strong>Password:</strong> ${sale.gmailPassword}</p>
                                <p><strong>Submitted:</strong> ${date}</p>
                                <p><strong>Amount:</strong> $${sale.amount}</p>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button onclick="approveSale('${doc.id}', ${sale.amount}, '${sale.userId}')" class="btn-success"><i class="fas fa-check"></i> Approve</button>
                                <button onclick="showRejectModal('${doc.id}', '${sale.gmailEmail}')" class="btn-danger"><i class="fas fa-times"></i> Reject</button>
                            </div>
                        </div>
                    `;
                });
                pendingSalesDiv.innerHTML = html;
            });
        }
        
        window.approveSale = async (saleId, amount, userId) => {
            if (!confirm(`Approve this Gmail sale? Add $${amount} to user's balance.`)) return;
            try {
                await db.collection('gmailSales').doc(saleId).update({ status: 'approved', approvedAt: firebase.firestore.FieldValue.serverTimestamp() });
                const userRef = db.collection('users').doc(userId);
                const userDoc = await userRef.get();
                await userRef.update({
                    balance: (userDoc.data().balance || 0) + amount,
                    totalEarned: (userDoc.data().totalEarned || 0) + amount,
                    totalSales: firebase.firestore.FieldValue.increment(1)
                });
                alert('✅ Sale approved!');
            } catch (error) { alert('Error: ' + error.message); }
        };
        
        window.showRejectModal = (saleId, gmailEmail) => {
            currentSaleId = saleId;
            document.getElementById('rejectGmail').textContent = gmailEmail;
            document.getElementById('rejectModal').style.display = 'flex';
        };
        
        document.getElementById('rejectReason')?.addEventListener('change', (e) => {
            document.getElementById('otherReason').style.display = e.target.value === 'Other' ? 'block' : 'none';
        });
        
        document.getElementById('confirmRejectBtn')?.addEventListener('click', async () => {
            if (!currentSaleId) return;
            let reason = document.getElementById('rejectReason').value;
            if (reason === 'Other') reason = document.getElementById('otherReason').value;
            if (!reason) { alert('Please enter a reason'); return; }
            try {
                await db.collection('gmailSales').doc(currentSaleId).update({ status: 'rejected', rejectionReason: reason, rejectedAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert('❌ Sale rejected!');
                document.getElementById('rejectModal').style.display = 'none';
                currentSaleId = null;
            } catch (error) { alert('Error: ' + error.message); }
        });
        
        document.getElementById('closeModalBtn')?.addEventListener('click', () => {
            document.getElementById('rejectModal').style.display = 'none';
            currentSaleId = null;
        });
        
        function loadAllUsers() {
            const usersListDiv = document.getElementById('usersList');
            usersListDiv.innerHTML = '<div class="loading">Loading users...</div>';
            db.collection('users').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) { usersListDiv.innerHTML = '<div style="text-align: center; padding: 40px;">No users found.</div>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const user = doc.data();
                    if (user.role === 'admin') return;
                    html += `
                        <div class="user-card">
                            <div class="user-info">
                                <p><strong>${user.name || user.email}</strong></p>
                                <p>Email: ${user.email}</p>
                                <p>Balance: $${(user.balance || 0).toFixed(2)}</p>
                                <p>Total Earned: $${(user.totalEarned || 0).toFixed(2)}</p>
                                <p>Sales: ${user.totalSales || 0}</p>
                                <p>Status: <span class="status-${user.status || 'active'}">${(user.status || 'active').toUpperCase()}</span></p>
                            </div>
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                <button onclick="editUser('${doc.id}', ${user.balance || 0}, '${user.status || 'active'}', '${user.name || ''}')" class="btn-primary"><i class="fas fa-edit"></i> Edit</button>
                                ${user.status !== 'banned' ? `<button onclick="banUser('${doc.id}')" class="btn-danger"><i class="fas fa-ban"></i> Ban</button>` : ''}
                                ${user.status !== 'suspended' ? `<button onclick="suspendUser('${doc.id}')" class="btn-warning"><i class="fas fa-pause"></i> Suspend</button>` : ''}
                                ${user.status !== 'active' ? `<button onclick="activateUser('${doc.id}')" class="btn-success"><i class="fas fa-play"></i> Activate</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                usersListDiv.innerHTML = html;
            });
        }
        
        window.editUser = (userId, balance, status, name) => {
            currentEditUserId = userId;
            document.getElementById('editUserInfo').innerHTML = `<p style="color: white;"><strong>User:</strong> ${name}</p>`;
            document.getElementById('editBalance').value = balance;
            document.getElementById('editStatus').value = status;
            document.getElementById('userEditModal').style.display = 'flex';
        };
        
        document.getElementById('saveUserBtn')?.addEventListener('click', async () => {
            if (!currentEditUserId) return;
            try {
                await db.collection('users').doc(currentEditUserId).update({
                    balance: parseFloat(document.getElementById('editBalance').value),
                    status: document.getElementById('editStatus').value
                });
                alert('✅ User updated!');
                document.getElementById('userEditModal').style.display = 'none';
                currentEditUserId = null;
            } catch (error) { alert('Error: ' + error.message); }
        });
        
        document.getElementById('closeUserModalBtn')?.addEventListener('click', () => {
            document.getElementById('userEditModal').style.display = 'none';
            currentEditUserId = null;
        });
        
        window.banUser = async (userId) => { if (confirm('Ban this user?')) await db.collection('users').doc(userId).update({ status: 'banned' }); };
        window.suspendUser = async (userId) => { if (confirm('Suspend this user?')) await db.collection('users').doc(userId).update({ status: 'suspended' }); };
        window.activateUser = async (userId) => { await db.collection('users').doc(userId).update({ status: 'active' }); };
        
        function loadWithdrawalRequests() {
            const withdrawalDiv = document.getElementById('withdrawalRequests');
            withdrawalDiv.innerHTML = '<div class="loading">Loading withdrawal requests...</div>';
            db.collection('withdrawals').where('status', '==', 'pending').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) { withdrawalDiv.innerHTML = '<div style="text-align: center; padding: 40px;">No pending withdrawals.</div>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const wd = doc.data();
                    html += `
                        <div class="withdraw-card">
                            <div class="sale-info">
                                <p><strong>User:</strong> ${wd.userEmail}</p>
                                <p><strong>Amount:</strong> $${wd.amount}</p>
                                <p><strong>BTC:</strong> ${wd.btcAddress}</p>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button onclick="approveWithdrawal('${doc.id}', ${wd.amount}, '${wd.userId}')" class="btn-success">Approve</button>
                                <button onclick="rejectWithdrawal('${doc.id}')" class="btn-danger">Reject</button>
                            </div>
                        </div>
                    `;
                });
                withdrawalDiv.innerHTML = html;
            });
        }
        
        window.approveWithdrawal = async (id, amount, userId) => {
            if (!confirm(`Approve $${amount} withdrawal?`)) return;
            try {
                await db.collection('withdrawals').doc(id).update({ status: 'completed' });
                const userRef = db.collection('users').doc(userId);
                const userDoc = await userRef.get();
                await userRef.update({ balance: (userDoc.data().balance || 0) - amount });
                alert('✅ Withdrawal approved!');
            } catch (error) { alert('Error: ' + error.message); }
        };
        
        window.rejectWithdrawal = async (id) => {
            if (confirm('Reject this withdrawal?')) await db.collection('withdrawals').doc(id).update({ status: 'rejected' });
        };
        
        async function loadStatistics() {
            const users = await db.collection('users').where('role', '==', 'user').get();
            const active = await db.collection('users').where('role', '==', 'user').where('status', '==', 'active').get();
            const sales = await db.collection('gmailSales').where('status', '==', 'approved').get();
            const withdrawals = await db.collection('withdrawals').where('status', '==', 'completed').get();
            let totalPayouts = 0;
            withdrawals.forEach(d => totalPayouts += d.data().amount);
            document.getElementById('totalUsers').textContent = users.size;
            document.getElementById('activeUsers').textContent = active.size;
            document.getElementById('totalSales').textContent = sales.size;
            document.getElementById('totalPayouts').textContent = `$${totalPayouts.toFixed(2)}`;
        }
    </script>
</body>
</html>
