<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Panel - GmailSell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .login-box {
            background: #1e293b;
            border-radius: 48px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
        }
        .login-icon { width: 90px; height: 90px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .login-icon i { font-size: 48px; color: white; }
        .login-box h1 { font-size: 32px; font-weight: 800; color: white; margin-bottom: 8px; }
        .login-box p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
        .google-login-btn { background: #3b82f6; color: white; border: none; padding: 16px 24px; border-radius: 100px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .admin-note { margin-top: 24px; padding-top: 24px; border-top: 1px solid #334155; color: #64748b; font-size: 12px; }

        .dashboard { min-height: 100vh; background: #0f172a; padding-bottom: 80px; display: none; }
        .app-header { background: #1e293b; padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .app-header h1 { font-size: 20px; color: white; }
        .admin-badge { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 8px 16px; border-radius: 40px; font-size: 12px; font-weight: 600; color: white; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
        .stat-card { background: #1e293b; border-radius: 24px; padding: 20px; text-align: center; }
        .stat-card i { font-size: 28px; color: #3b82f6; margin-bottom: 8px; }
        .stat-card h3 { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        .stat-card .value { font-size: 24px; font-weight: 800; color: white; }

        .section-card { background: #1e293b; border-radius: 28px; padding: 20px; margin: 16px; }
        .section-title { font-size: 18px; font-weight: 700; color: white; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .list-item { background: #0f172a; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        .item-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .item-info p { margin: 4px 0; font-size: 13px; color: #94a3b8; }
        .item-info p strong { color: white; }
        .item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-sm { padding: 6px 14px; border: none; border-radius: 30px; font-size: 12px; font-weight: 500; cursor: pointer; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #1e293b; border-radius: 32px; padding: 28px; max-width: 400px; width: 100%; }
        .modal-content h3 { color: white; margin-bottom: 20px; }
        .modal-content label { color: #94a3b8; display: block; margin: 12px 0 6px; font-size: 13px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 16px; color: white; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 16px 20px; border-top: 1px solid #334155; z-index: 100; }
        .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 8px 16px; border-radius: 40px; }
        .nav-tab i { font-size: 22px; color: #64748b; }
        .nav-tab span { font-size: 11px; color: #64748b; }
        .nav-tab.active i, .nav-tab.active span { color: #3b82f6; }

        .floating-logout { position: fixed; bottom: 90px; right: 16px; background: #ef4444; border: none; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 99; }
        .toast { position: fixed; top: 80px; left: 16px; right: 16px; background: #10b981; color: white; padding: 14px 20px; border-radius: 60px; display: none; text-align: center; z-index: 200; }
        .toast.error { background: #ef4444; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .loading-spinner { text-align: center; padding: 40px; color: #64748b; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .badge-active { background: #10b98120; color: #10b981; }
        .badge-suspended { background: #f59e0b20; color: #f59e0b; }
        .badge-banned { background: #ef444420; color: #ef4444; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-icon"><i class="fas fa-crown"></i></div>
        <h1>Admin Panel</h1>
        <p>Manage Gmail Selling Platform</p>
        <button id="googleLoginBtn" class="google-login-btn"><i class="fab fa-google"></i> Sign in with Google</button>
        <div class="admin-note"><i class="fas fa-shield-alt"></i> Any Google account can access</div>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="app-header">
        <h1><i class="fas fa-crown"></i> Admin Panel</h1>
        <div class="admin-badge" id="adminEmail">Admin</div>
    </div>

    <div id="statsTab" class="tab-pane active">
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3>Total Users</h3><div class="value" id="totalUsers">0</div></div>
            <div class="stat-card"><i class="fas fa-user-check"></i><h3>Active Users</h3><div class="value" id="activeUsers">0</div></div>
            <div class="stat-card"><i class="fas fa-envelope"></i><h3>Total Sales</h3><div class="value" id="totalSales">0</div></div>
            <div class="stat-card"><i class="fas fa-dollar-sign"></i><h3>Total Payouts</h3><div class="value" id="totalPayouts">$0</div></div>
        </div>
    </div>

    <div id="verifyTab" class="tab-pane">
        <div class="section-card"><div class="section-title"><i class="fas fa-clock"></i> Pending Verifications</div><div id="pendingSales"></div></div>
    </div>

    <div id="usersTab" class="tab-pane">
        <div class="section-card"><div class="section-title"><i class="fas fa-users"></i> Manage Users</div><div id="usersList"></div></div>
    </div>

    <div id="withdrawalsTab" class="tab-pane">
        <div class="section-card"><div class="section-title"><i class="fab fa-bitcoin"></i> Withdrawal Requests</div><div id="withdrawalRequests"></div></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-tab active" data-tab="stats"><i class="fas fa-chart-line"></i><span>Stats</span></button>
        <button class="nav-tab" data-tab="verify"><i class="fas fa-check-double"></i><span>Verify</span></button>
        <button class="nav-tab" data-tab="users"><i class="fas fa-users"></i><span>Users</span></button>
        <button class="nav-tab" data-tab="withdrawals"><i class="fab fa-bitcoin"></i><span>Withdraw</span></button>
    </div>

    <button id="logoutBtn" class="floating-logout"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div id="toast" class="toast"></div>

<div id="rejectModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Reject Gmail Sale</h3>
        <p id="rejectGmail" style="color:#94a3b8; margin-bottom:12px;"></p>
        <select id="rejectReason">
            <option value="Wrong Password">Wrong Password</option>
            <option value="Wrong Gmail Address">Wrong Gmail Address</option>
            <option value="Temporary/Disabled Account">Temporary/Disabled Account</option>
            <option value="2-Step Verification Required">2-Step Verification Required</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="otherReason" placeholder="Other reason" style="display:none;">
        <div class="modal-actions">
            <button id="confirmRejectBtn" class="btn-sm btn-danger">Confirm</button>
            <button id="closeModalBtn" class="btn-sm btn-primary">Cancel</button>
        </div>
    </div>
</div>

<div id="userEditModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Edit User</h3>
        <div id="editUserInfo"></div>
        <label>Balance (USD)</label>
        <input type="number" id="editBalance" step="0.01">
        <label>Status</label>
        <select id="editStatus">
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
            <option value="banned">Banned</option>
        </select>
        <div class="modal-actions">
            <button id="saveUserBtn" class="btn-sm btn-success">Save</button>
            <button id="closeUserModalBtn" class="btn-sm btn-primary">Cancel</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBChVfSCJhhxhDgXWM5x3ryrwYtVZmwSmc",
        authDomain: "sellapp-66d68.firebaseapp.com",
        projectId: "sellapp-66d68",
        storageBucket: "sellapp-66d68.firebasestorage.app",
        messagingSenderId: "478211272161",
        appId: "1:478211272161:web:ed55d6c8b366a192ba36a0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentSaleId = null;
    let currentEditUserId = null;

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = isError ? 'toast error' : 'toast';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('adminEmail').innerHTML = user.email.split('@')[0];
            
            const userRef = db.collection('users').doc(user.uid);
            const userDoc = await userRef.get();
            if (!userDoc.exists) {
                await userRef.set({
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    role: 'user',
                    balance: 0,
                    totalEarned: 0,
                    totalSales: 0,
                    totalReferrals: 0,
                    status: 'active',
                    referralCode: user.uid.substring(0, 8),
                    referredBy: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            loadPendingSales();
            loadAllUsers();
            loadWithdrawalRequests();
            loadStatistics();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    });

    document.getElementById('googleLoginBtn').addEventListener('click', () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(error => {
            if (error.code === 'auth/popup-blocked') {
                alert("Popup blocked! Please allow popups for this site.");
            } else {
                alert("Login error: " + error.message);
            }
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
            if (tabName === 'verify') loadPendingSales();
            if (tabName === 'users') loadAllUsers();
            if (tabName === 'withdrawals') loadWithdrawalRequests();
            if (tabName === 'stats') loadStatistics();
        });
    });

    // Real-time Pending Sales
    function loadPendingSales() {
        const div = document.getElementById('pendingSales');
        div.innerHTML = '<div class="loading-spinner">Loading...</div>';
        db.collection('gmailSales').where('status', '==', 'pending').orderBy('createdAt', 'desc').onSnapshot(snap => {
            if (snap.empty) { div.innerHTML = '<div class="empty-state">No pending sales</div>'; return; }
            let html = '';
            snap.forEach(doc => {
                const s = doc.data();
                html += `<div class="list-item"><div class="item-header"><div class="item-info"><p><strong>${s.userEmail}</strong></p><p>📧 ${s.gmailEmail}</p><p>🔑 ${s.gmailPassword}</p><p>💰 $${s.amount}</p></div><div class="item-actions"><button onclick="approveSale('${doc.id}',${s.amount},'${s.userId}')" class="btn-sm btn-success">Approve</button><button onclick="showRejectModal('${doc.id}','${s.gmailEmail}')" class="btn-sm btn-danger">Reject</button></div></div></div>`;
            });
            div.innerHTML = html;
        });
    }

    // Approve Sale - Updates balance
    window.approveSale = async (id, amount, uid) => {
        if (!confirm(`Approve? Add $${amount} to user balance`)) return;
        try {
            await db.collection('gmailSales').doc(id).update({ status: 'approved', approvedAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            const userRef = db.collection('users').doc(uid);
            const user = await userRef.get();
            const currentBalance = user.data().balance || 0;
            const currentEarned = user.data().totalEarned || 0;
            
            await userRef.update({
                balance: currentBalance + amount,
                totalEarned: currentEarned + amount,
                totalSales: firebase.firestore.FieldValue.increment(1)
            });
            showToast('Sale approved! Balance updated.');
        } catch (error) { showToast('Error: ' + error.message, true); }
    };

    window.showRejectModal = (id, email) => { currentSaleId = id; document.getElementById('rejectGmail').innerHTML = email; document.getElementById('rejectModal').style.display = 'flex'; };
    document.getElementById('rejectReason').addEventListener('change', (e) => { document.getElementById('otherReason').style.display = e.target.value === 'Other' ? 'block' : 'none'; });
    document.getElementById('confirmRejectBtn').addEventListener('click', async () => {
        if (!currentSaleId) return;
        let reason = document.getElementById('rejectReason').value;
        if (reason === 'Other') reason = document.getElementById('otherReason').value;
        if (!reason) return;
        await db.collection('gmailSales').doc(currentSaleId).update({ status: 'rejected', rejectionReason: reason, rejectedAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('rejectModal').style.display = 'none';
        showToast('Sale rejected');
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('rejectModal').style.display = 'none');

    // Real-time Users List
    function loadAllUsers() {
        const div = document.getElementById('usersList');
        div.innerHTML = '<div class="loading-spinner">Loading...</div>';
        db.collection('users').orderBy('createdAt', 'desc').onSnapshot(snap => {
            if (snap.empty) { div.innerHTML = '<div class="empty-state">No users</div>'; return; }
            let html = '';
            snap.forEach(doc => {
                const u = doc.data();
                html += `<div class="list-item"><div class="item-header"><div class="item-info"><p><strong>${u.name || u.email}</strong></p><p>Email: ${u.email}</p><p>Role: ${u.role || 'user'}</p><p>Balance: $${(u.balance || 0).toFixed(2)}</p><p>Earned: $${(u.totalEarned || 0).toFixed(2)}</p><p>Sales: ${u.totalSales || 0}</p><p><span class="badge badge-${u.status || 'active'}">${(u.status || 'active').toUpperCase()}</span></p></div><div class="item-actions"><button onclick="editUser('${doc.id}',${u.balance || 0},'${u.status || 'active'}','${u.name || ''}')" class="btn-sm btn-primary">Edit</button>${u.status !== 'banned' ? `<button onclick="banUser('${doc.id}')" class="btn-sm btn-danger">Ban</button>` : ''}${u.status !== 'suspended' ? `<button onclick="suspendUser('${doc.id}')" class="btn-sm btn-warning">Suspend</button>` : ''}${u.status !== 'active' ? `<button onclick="activateUser('${doc.id}')" class="btn-sm btn-success">Activate</button>` : ''}</div></div></div>`;
            });
            div.innerHTML = html;
        });
    }

    window.editUser = (id, balance, status, name) => { currentEditUserId = id; document.getElementById('editUserInfo').innerHTML = `<p style="color:white;"><strong>${name}</strong></p>`; document.getElementById('editBalance').value = balance; document.getElementById('editStatus').value = status; document.getElementById('userEditModal').style.display = 'flex'; };
    document.getElementById('saveUserBtn').addEventListener('click', async () => { if (currentEditUserId) { await db.collection('users').doc(currentEditUserId).update({ balance: parseFloat(document.getElementById('editBalance').value), status: document.getElementById('editStatus').value }); document.getElementById('userEditModal').style.display = 'none'; showToast('User updated'); } });
    document.getElementById('closeUserModalBtn').addEventListener('click', () => document.getElementById('userEditModal').style.display = 'none');
    window.banUser = async (id) => { if (confirm('Ban this user?')) await db.collection('users').doc(id).update({ status: 'banned' }); };
    window.suspendUser = async (id) => { if (confirm('Suspend this user?')) await db.collection('users').doc(id).update({ status: 'suspended' }); };
    window.activateUser = async (id) => { await db.collection('users').doc(id).update({ status: 'active' }); };

    // Real-time Withdrawal Requests
    function loadWithdrawalRequests() {
        const div = document.getElementById('withdrawalRequests');
        div.innerHTML = '<div class="loading-spinner">Loading...</div>';
        db.collection('withdrawals').where('status', '==', 'pending').orderBy('createdAt', 'desc').onSnapshot(snap => {
            if (snap.empty) { div.innerHTML = '<div class="empty-state">No pending withdrawals</div>'; return; }
            let html = '';
            snap.forEach(doc => {
                const w = doc.data();
                html += `<div class="list-item"><div class="item-header"><div class="item-info"><p><strong>${w.userEmail}</strong></p><p>💰 $${w.amount}</p><p>🏦 ${w.btcAddress}</p></div><div class="item-actions"><button onclick="approveWithdrawal('${doc.id}',${w.amount},'${w.userId}')" class="btn-sm btn-success">Approve</button><button onclick="rejectWithdrawal('${doc.id}')" class="btn-sm btn-danger">Reject</button></div></div></div>`;
            });
            div.innerHTML = html;
        });
    }

    window.approveWithdrawal = async (id, amount, uid) => { 
        if (!confirm(`Approve $${amount} withdrawal?`)) return; 
        try {
            await db.collection('withdrawals').doc(id).update({ status: 'completed', completedAt: firebase.firestore.FieldValue.serverTimestamp() }); 
            const user = await db.collection('users').doc(uid).get(); 
            await db.collection('users').doc(uid).update({ balance: (user.data().balance || 0) - amount }); 
            showToast('Withdrawal approved! Balance deducted.');
        } catch (error) { showToast('Error: ' + error.message, true); }
    };
    window.rejectWithdrawal = async (id) => { if (confirm('Reject?')) await db.collection('withdrawals').doc(id).update({ status: 'rejected', rejectedAt: firebase.firestore.FieldValue.serverTimestamp() }); };

    // Real-time Statistics
    async function loadStatistics() {
        const users = await db.collection('users').get();
        const active = await db.collection('users').where('status', '==', 'active').get();
        const sales = await db.collection('gmailSales').where('status', '==', 'approved').get();
        const withdrawals = await db.collection('withdrawals').where('status', '==', 'completed').get();
        let payouts = 0; withdrawals.forEach(d => payouts += d.data().amount);
        document.getElementById('totalUsers').innerHTML = users.size;
        document.getElementById('activeUsers').innerHTML = active.size;
        document.getElementById('totalSales').innerHTML = sales.size;
        document.getElementById('totalPayouts').innerHTML = `$${payouts.toFixed(2)}`;
        
        // Real-time stats update
        db.collection('users').onSnapshot(() => loadStatistics());
    }
</script>
</body>
</html>
